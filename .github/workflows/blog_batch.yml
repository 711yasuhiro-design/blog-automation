name: Weekly Blog Batch Generation

on:
  schedule:
    # Every Saturday at 02:00 JST (= Friday 17:00 UTC)
    - cron: '0 17 * * 5'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  generate-articles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Japanese font for image generation
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests anthropic python-dotenv Pillow

      - name: Create .env file
        run: |
          cat > .env << EOF
          CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}
          NOTION_API_KEY=${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID=${{ secrets.NOTION_DATABASE_ID }}
          WORDPRESS_URL=${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME=${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_PASSWORD=${{ secrets.WORDPRESS_PASSWORD }}
          CANVA_API_KEY=${{ secrets.CANVA_API_KEY }}
          EOF

      - name: Run batch article generation
        run: python run_batch.py

      - name: Upload execution log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: batch-execution-log
          path: blog-automation/
          retention-days: 7
